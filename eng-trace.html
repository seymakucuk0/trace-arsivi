<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRACE Archive</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f8fa;
  color: #1f2430;
  padding: 24px 32px;
  min-height: 100vh;
}
.container { max-width: 1600px; margin: 0 auto; }

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 16px;
  flex-wrap: wrap;
}
.topbar h1 { font-size: 24px; letter-spacing: 0.3px; color: #1f2430; }
.topbar .sub { color: #6b7280; font-size: 13px; margin-top: 2px; }

.btn {
  background: #ffffff;
  border: 1px solid #d8dde5;
  color: #1f2430;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s ease;
  box-shadow: 0 1px 2px rgba(15,20,30,0.04);
}
.btn:hover { background: #f0f2f6; border-color: #c2c8d3; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:disabled:hover { background: #ffffff; border-color: #d8dde5; }

/* Search bar — top, full width */
.search-bar {
  margin-bottom: 12px;
  position: relative;
}
.search-bar input {
  width: 100%;
  background: #ffffff;
  border: 1px solid #d8dde5;
  border-radius: 10px;
  padding: 12px 16px 12px 42px;
  font-size: 14px;
  color: #1f2430;
  font-family: inherit;
  outline: none;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-bar input:focus {
  border-color: #6b8cf2;
  box-shadow: 0 0 0 3px rgba(107,140,242,0.12);
}
.search-bar::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  opacity: 0.5;
}

/* Controls row */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 12px 16px;
  background: #ffffff;
  border: 1px solid #e3e6ec;
  border-radius: 10px;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
}
.control-group { display: flex; align-items: center; gap: 8px; }
.control-group label {
  font-size: 12px;
  color: #6b7280;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.input, .select {
  background: #ffffff;
  border: 1px solid #d8dde5;
  border-radius: 7px;
  padding: 7px 11px;
  font-size: 13px;
  color: #1f2430;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.input:focus, .select:focus {
  border-color: #6b8cf2;
  box-shadow: 0 0 0 3px rgba(107,140,242,0.15);
}
.range-input { width: 60px; text-align: center; }
.range-sep { color: #9aa1ad; font-size: 13px; }

.divider { width: 1px; height: 22px; background: #e3e6ec; }

.pager {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}
.pager .page-info {
  font-size: 13px;
  color: #4b5160;
  padding: 0 8px;
  font-variant-numeric: tabular-nums;
}
.pager .page-btn {
  padding: 6px 10px;
  font-size: 13px;
  min-width: 32px;
}
.results-info {
  font-size: 12px;
  color: #6b7280;
  margin-left: 6px;
}

.list { display: flex; flex-direction: column; gap: 10px; }

.trace {
  background: #ffffff;
  border: 1px solid #e3e6ec;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 1px 2px rgba(15,20,30,0.03);
}
.trace-header {
  padding: 14px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  user-select: none;
  transition: background 0.15s;
}
.trace-header:hover { background: #f7f8fa; }
.caret {
  color: #9aa1ad;
  font-size: 12px;
  transition: transform 0.2s;
  width: 12px;
  display: inline-block;
}
.trace.open .caret { transform: rotate(90deg); }
.num { font-weight: 700; color: #9aa1ad; font-size: 13px; min-width: 50px; }
.title { font-size: 15px; font-weight: 500; flex: 1; color: #1f2430; }
.meta { font-size: 12px; color: #6b7280; }

.trace-body {
  display: none;
  padding: 6px 20px 22px 20px;
  border-top: 1px solid #eef0f4;
  background: #fafbfc;
}
.trace.open .trace-body { display: block; }

.chain-row {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-top: 14px;
  flex-wrap: nowrap;
  overflow-x: auto;
  padding-bottom: 6px;
}

.col-wrap {
  flex: 1 1 0;
  min-width: 140px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.node {
  background: #e8f5ec;
  border: 1px solid #b6dcc1;
  border-radius: 8px;
  padding: 8px 10px;
  text-align: center;
  font-size: 13px;
  line-height: 1.3;
  color: #1f6b3a;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 78px;
  overflow: hidden;
}
.node.muted {
  background: #f0f2f6;
  border-color: #d8dde5;
  color: #4b5160;
  font-weight: 400;
}

.decoy {
  background: #fdf2f3;
  border: 1px dashed #f0c2c5;
  color: #a85560;
  padding: 6px 8px;
  font-size: 12px;
  border-radius: 7px;
  text-align: center;
  line-height: 1.3;
  font-weight: 400;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  height: 50px;
  overflow: hidden;
}
.decoy::before {
  content: '✗';
  color: #d97078;
  font-weight: 700;
  font-size: 11px;
  flex-shrink: 0;
}

.connector {
  display: flex;
  align-items: center;
  height: 78px;
  flex-shrink: 0;
}
.arrow { color: #b8bdc7; font-size: 16px; }

.step-num {
  font-size: 10px;
  color: #8a93a6;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 4px;
  font-weight: 500;
}
.node.muted .step-num { color: #9aa1ad; }
.node-content { display: flex; flex-direction: column; gap: 2px; }

.empty {
  text-align: center;
  padding: 40px;
  color: #9aa1ad;
  font-size: 14px;
}

@media (max-width: 1100px) {
  .col-wrap { min-width: 130px; }
}

.explain-list {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid #eef0f3;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.explain-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #8a93a6;
  font-weight: 600;
  margin-bottom: 2px;
}
.explain-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.ex-num {
  flex-shrink: 0;
  width: 20px;
  height: 20px;
  margin-top: 1px;
  border-radius: 50%;
  background: #e8f5ec;
  border: 1px solid #b6dcc1;
  color: #1f6b3a;
  font-size: 11px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}
.ex-text {
  font-size: 13px;
  line-height: 1.55;
  color: #3a4150;
}
.ex-text b { color: #1f6b3a; font-weight: 600; }
.ex-text b::after { content: ' — '; color: #b8bdc7; font-weight: 400; }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div>
      <h1>TRACE Archive</h1>
      <div class="sub" id="subtitle"></div>
    </div>
    <button class="btn" id="expandBtn">Expand All</button>
  </div>

  <div class="search-bar">
    <input id="searchInput" type="text" placeholder="Search by title…">
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Page Size</label>
      <select class="select" id="pageSizeSelect">
        <option value="10">10 per page</option>
        <option value="25" selected>25 per page</option>
        <option value="50">50 per page</option>
        <option value="100">100 per page</option>
        <option value="all">All</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="control-group">
      <label>Status</label>
      <select class="select" id="statusSelect">
        <option value="all" selected>All</option>
        <option value="Safe">Safe</option>
        <option value="Inspect">Inspect</option>
      </select>
    </div>
    <div class="divider"></div>
    <div class="control-group">
      <label>Range</label>
      <input class="input range-input" id="rangeFrom" type="number" min="1" placeholder="-">
      <span class="range-sep">—</span>
      <input class="input range-input" id="rangeTo" type="number" min="1" placeholder="-">
      <button class="btn" id="rangeReset" style="padding:7px 12px;">Reset</button>
    </div>
    <div class="pager" id="pager"></div>
    <div class="results-info" id="resultsInfo"></div>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
const TRACES = [

  {

      {

          "Single-Player Games",

const TOTAL = TRACES.length;

const list = document.getElementById('list');
const expandBtn = document.getElementById('expandBtn');
const searchInput = document.getElementById('searchInput');
const pageSizeSelect = document.getElementById('pageSizeSelect');
const statusSelect = document.getElementById('statusSelect');
const rangeFrom = document.getElementById('rangeFrom');
const rangeTo = document.getElementById('rangeTo');
const rangeReset = document.getElementById('rangeReset');
const resultsInfo = document.getElementById('resultsInfo');
const pager = document.getElementById('pager');
document.getElementById('subtitle').textContent = TOTAL + ' traces';

let allOpen = false;
let currentPage = 1;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function getActiveFilter() {
  const q = searchInput.value.trim().toLowerCase();
  // First apply search filter
  let pool = TRACES.filter(t => !q || t.title.toLowerCase().includes(q));
  const st = statusSelect.value;
  if (st !== 'all') pool = pool.filter(t => t.status === st);
  // Apply range if set
  const from = parseInt(rangeFrom.value);
  const to = parseInt(rangeTo.value);
  const rangeActive = !isNaN(from) || !isNaN(to);
  if (rangeActive) {
    const f = isNaN(from) ? 1 : from;
    const tt = isNaN(to) ? Infinity : to;
    pool = pool.filter(t => t.num >= f && t.num <= tt);
  }
  return { pool, rangeActive };
}

function render() {
  const { pool, rangeActive } = getActiveFilter();
  const pageSizeRaw = pageSizeSelect.value;
  const usingPagination = !rangeActive && pageSizeRaw !== 'all';

  let displayed = pool;
  let totalPages = 1;
  if (usingPagination) {
    const ps = parseInt(pageSizeRaw);
    totalPages = Math.max(1, Math.ceil(pool.length / ps));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    const startIdx = (currentPage - 1) * ps;
    displayed = pool.slice(startIdx, startIdx + ps);
  }

  // Pager UI
  if (usingPagination && totalPages > 1) {
    pager.innerHTML = `
      <button class="btn page-btn" id="prevPg" ${currentPage<=1?'disabled':''}>‹</button>
      <span class="page-info">Page ${currentPage} of ${totalPages}</span>
      <button class="btn page-btn" id="nextPg" ${currentPage>=totalPages?'disabled':''}>›</button>
    `;
    document.getElementById('prevPg').onclick = () => { if (currentPage>1) { currentPage--; render(); } };
    document.getElementById('nextPg').onclick = () => { if (currentPage<totalPages) { currentPage++; render(); } };
  } else {
    pager.innerHTML = '';
  }

  // Results info
  if (displayed.length === 0) {
    resultsInfo.textContent = '0 results';
  } else {
    const firstN = displayed[0].num;
    const lastN = displayed[displayed.length - 1].num;
    resultsInfo.textContent = `${displayed.length} traces · #${firstN}–#${lastN}`;
  }

  if (displayed.length === 0) {
    list.innerHTML = '<div class="empty">No matching traces found.</div>';
    return;
  }

  list.innerHTML = displayed.map(t => {
    const startNode = t.start || (t.steps[0] && t.steps[0].prev) || '';
    const lastIdx = t.steps.length - 1;
    const cols = [];
    if (startNode) {
      cols.push(`<div class="col-wrap"><div class="node muted"><div class="node-content"><div class="step-num">Start</div><div>${startNode}</div></div></div></div>`);
    }
    t.steps.forEach((s, i) => {
      if (cols.length > 0) {
        cols.push(`<div class="connector"><div class="arrow">→</div></div>`);
      }
      const muted = (i === lastIdx) ? ' muted' : '';
      const decoyHtml = (s.wrong || []).map(w => `<div class="decoy">${w}</div>`).join('');
      cols.push(`<div class="col-wrap"><div class="node${muted}"><div class="node-content"><div class="step-num">Step ${s.n}</div><div>${s.correct}</div></div></div>${decoyHtml}</div>`);
    });
    const isOpen = allOpen ? ' open' : '';
    const explainRows = t.steps
      .filter(s => s.aciklama)
      .map(s => `<div class="explain-row"><span class="ex-num">${s.n}</span><div class="ex-text"><b>${esc(s.correct)}</b>${esc(s.aciklama)}</div></div>`)
      .join('');
    const explainHtml = explainRows
      ? `<div class="explain-list"><div class="explain-title">Explanations</div>${explainRows}</div>`
      : '';
    return `
      <div class="trace${isOpen}" data-num="${t.num}">
        <div class="trace-header">
          <span class="caret">▶</span>
          <div class="num">#${t.num}</div>
          <div class="title">${t.title}</div>
          <div class="status-tag" style="font-size:11px;padding:2px 8px;border-radius:10px;background:${t.status==='Safe'?'#e8f5ec':'#fff3cd'};color:${t.status==='Safe'?'#1f6b3a':'#856404'};margin-right:8px;white-space:nowrap;font-weight:600;">${t.status}</div>
          <div class="meta">${t.steps.length} steps</div>
        </div>
        <div class="trace-body">
          <div class="chain-row">${cols.join('')}</div>
          ${explainHtml}
        </div>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.trace-header').forEach(h => {
    h.onclick = () => h.parentElement.classList.toggle('open');
  });
}

expandBtn.onclick = () => {
  allOpen = !allOpen;
  document.querySelectorAll('.trace').forEach(t => t.classList.toggle('open', allOpen));
  expandBtn.textContent = allOpen ? 'Collapse All' : 'Expand All';
};

searchInput.addEventListener('input', () => { currentPage = 1; render(); });
pageSizeSelect.addEventListener('change', () => { currentPage = 1; render(); });
statusSelect.addEventListener('change', () => { currentPage = 1; render(); });
rangeFrom.addEventListener('input', () => { currentPage = 1; render(); });
rangeTo.addEventListener('input', () => { currentPage = 1; render(); });
rangeReset.onclick = () => {
  rangeFrom.value = '';
  rangeTo.value = '';
  searchInput.value = '';
  currentPage = 1;
  render();
};

render();
</script>
</body>
</html>
